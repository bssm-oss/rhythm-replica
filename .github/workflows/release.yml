name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: macos-13
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate project
        run: xcodegen generate
      - name: Test
        run: /usr/bin/xcodebuild -project RhythmReplica.xcodeproj -scheme RhythmReplica -destination 'platform=macOS' test
      - name: Build release app
        run: ./scripts/build-release.sh
      - name: Package DMG
        run: ./scripts/package-dmg.sh
      - name: SHA256
        run: ./scripts/sha256.sh build/RhythmReplica.dmg > build/RhythmReplica.dmg.sha256
      - name: Archive signing prerequisites
        run: |
          echo "APPLE_ID=${{ secrets.APPLE_ID != '' }}"
          echo "APPLE_TEAM_ID=${{ secrets.APPLE_TEAM_ID != '' }}"
          echo "APP_SPECIFIC_PASSWORD=${{ secrets.APP_SPECIFIC_PASSWORD != '' }}"
          echo "DEVELOPER_ID_APPLICATION=${{ secrets.DEVELOPER_ID_APPLICATION != '' }}"
          echo "CERTIFICATE_P12=${{ secrets.CERTIFICATE_P12 != '' }}"
          echo "CERTIFICATE_PASSWORD=${{ secrets.CERTIFICATE_PASSWORD != '' }}"
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/RhythmReplica.dmg
            build/RhythmReplica.dmg.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
